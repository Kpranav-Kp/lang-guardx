target-version = "py311"
src = ["core", "repoinsight"]
line-length = 200
exclude = [
    ".git",
    "__pycache__",
    ".mypy_cache",
    "pytest_cache",
    ".ruff_cache",
    "venv",
    ".venv",
    "build",
    "dist",
]

[lint]
select = ["E", "W", "F", "I", "UP", "DJ", "S", "B"]
ignore = [
    "E203",
]

[lint.per-file-ignores]
"tests/*.py" = ["S101"]
"scripts/*.py" = ["T201"]

[lint.isort]
known-first-party = ["lang_guardx"]
known-third-party = [
    "bitarray",
    "huggingface_hub",
    "langchain",
    "langchain_community",
    "langchain_core",
    "langchain_groq",
    "langchain_mistralai",
    "mmh3",
    "pytest",
    "safetensors",
    "sqlalchemy",
    "sqlglot",
    "torch",
    "transformers",
]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
docstring-code-format = true
